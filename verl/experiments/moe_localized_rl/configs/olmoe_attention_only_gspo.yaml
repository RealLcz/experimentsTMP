# OLMoE Attention-only GSPO experiment config.
# Control experiment: only attention layers are trainable.
# IDENTICAL to olmoe_moe_gspo.yaml except parameter_update.mode=attention_only.

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

data:
  train_files: "['/mnt/vast/home/ym56kacy/jinhe/MendelGM/wom/data/math/train.parquet']"
  val_files: "['/mnt/vast/home/ym56kacy/jinhe/MendelGM/wom/data/math/test.parquet']"
  train_batch_size: 256
  max_prompt_length: 1024
  max_response_length: 1024
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  seed: 42

actor_rollout_ref:
  model:
    path: /mnt/vast/home/ym56kacy/jinhe/MendelGM/wom/models/OLMoE-1B-7B-0125-Instruct
    use_remove_padding: true
    enable_gradient_checkpointing: true

  actor:
    strategy: fsdp2
    policy_loss:
      loss_mode: gspo
    loss_agg_mode: seq-mean-token-mean
    clip_ratio_low: 3e-4
    clip_ratio_high: 4e-4
    clip_ratio_c: 10.0
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 64
    use_dynamic_bsz: true
    ppo_max_token_len_per_gpu: 16384
    use_kl_loss: false
    entropy_coeff: 0
    fsdp_config:
      param_offload: false
      optimizer_offload: false
    data_loader_seed: 42
    # Parameter update policy: ATTENTION-ONLY (control for MoE-only)
    parameter_update:
      mode: attention_only
      strict: true
      log_parameter_stats: true

  rollout:
    name: vllm
    tensor_model_parallel_size: 2
    gpu_memory_utilization: 0.6
    n: 16
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 16384
    temperature: 1.0
    top_p: 1.0

  ref:
    strategy: fsdp2
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 16384
    fsdp_config:
      param_offload: true

trainer:
  balance_batch: true
  critic_warmup: 0
  logger: '["console","tensorboard"]'
  project_name: moe_localized_rl_pilot_v2
  experiment_name: olmoe_gspo_attention_only_math_seed0
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 200
  test_freq: 10
  total_epochs: 15
  test_before_train: true
